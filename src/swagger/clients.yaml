paths:
  /api/clients:
    get:
      summary: Listar todos los clientes
      tags: [Clientes]
      security: []
      responses:
        200:
          description: Lista de clientes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Client'

    post:
      summary: Crear un nuevo cliente
      tags: [Clientes]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClient'
      responses:
        201:
          description: Cliente creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        400:
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/clients/search:
    get:
      summary: Buscar clientes por nombre
      tags: [Clientes]
      security: []
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
      responses:
        200:
          description: Lista de clientes encontrados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Client'

  /api/clients/{id}:
    get:
      summary: Obtener cliente por ID
      tags: [Clientes]
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        200:
          description: Cliente encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        404:
          description: Cliente no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Actualizar cliente
      tags: [Clientes]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClient'
      responses:
        200:
          description: Cliente actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'

    delete:
      summary: Eliminar cliente
      tags: [Clientes]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        204:
          description: Cliente eliminado
        404:
          description: Cliente no encontrado

  /api/clients/{id}/toggle-status:
    patch:
      summary: Cambiar estado de un cliente
      tags: [Clientes]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        200:
          description: Estado cambiado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'