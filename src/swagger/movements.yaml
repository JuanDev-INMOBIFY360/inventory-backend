paths:
  /api/movements:
    get:
      summary: Listar todos los movimientos
      tags: [Movimientos]
      security: []
      responses:
        200:
          description: Lista de movimientos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Movement'

    post:
      summary: Crear un nuevo movimiento
      tags: [Movimientos]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMovement'
      responses:
        201:
          description: Movimiento creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Movement'
        400:
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/movements/unit/{unitId}:
    get:
      summary: Listar movimientos por unidad
      tags: [Movimientos]
      security: []
      parameters:
        - name: unitId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Lista de movimientos de la unidad
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Movement'

  /api/movements/user/{userId}:
    get:
      summary: Listar movimientos por usuario
      tags: [Movimientos]
      security: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Lista de movimientos del usuario
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Movement'

  /api/movements/{id}:
    get:
      summary: Obtener movimiento por ID
      tags: [Movimientos]
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        200:
          description: Movimiento encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Movement'
        404:
          description: Movimiento no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Eliminar movimiento
      tags: [Movimientos]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        204:
          description: Movimiento eliminado
        404:
          description: Movimiento no encontrado