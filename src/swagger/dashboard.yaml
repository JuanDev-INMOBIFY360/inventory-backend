paths:
  /api/dashboard/stats:
    get:
      summary: Obtener estadísticas del dashboard
      tags: [Dashboard]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Estadísticas del sistema
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalRevenue:
                    type: number
                    example: 176700000
                  totalCost:
                    type: number
                    example: 62310000
                  totalProfit:
                    type: number
                    example: 114390000
                  profitMargin:
                    type: number
                    example: 64.7
                  totalUnitsSold:
                    type: integer
                    example: 93
                  totalClients:
                    type: integer
                    example: 67
                  totalProducts:
                    type: integer
                    example: 45
                  availableUnits:
                    type: integer
                    example: 35

  /api/dashboard/top-selling:
    get:
      summary: Obtener productos más vendidos
      tags: [Dashboard]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        200:
          description: Top productos más vendidos
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    productId:
                      type: string
                      format: uuid
                    productName:
                      type: string
                      example: "PlayStation 5 Slim"
                    brand:
                      type: string
                      example: "Sony"
                    unitsSold:
                      type: integer
                      example: 12
                    totalRevenue:
                      type: number
                      example: 22800000
                    profit:
                      type: number
                      example: 14760000

  /api/dashboard/recent-movements:
    get:
      summary: Obtener movimientos recientes
      tags: [Dashboard]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        200:
          description: Movimientos recientes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Movement'